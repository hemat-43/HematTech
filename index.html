<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HematTech</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MODE SELECT -->
<div id="modeSelect" class="center">
  <h2>HematTech</h2>
  <button onclick="enterAdmin()">🔐 Admin Mode</button>
  <button onclick="enterUser()">👤 User Mode</button>
</div>

<!-- MAIN -->
<div id="app" class="hidden">

  <!-- HEADER -->
  <div class="header">
    <h3>📢 HematTech Channel</h3>
    <button id="addBtn" onclick="openPanel()">➕</button>
  </div>

  <!-- POSTS -->
  <div id="posts"></div>

</div>

<!-- ADMIN PANEL -->
<div id="panel" class="modal hidden">
  <div class="box">
    <textarea id="caption" placeholder="Caption..."></textarea>
    <input type="file" id="file">
    <button onclick="publish()">Publish</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
