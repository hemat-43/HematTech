<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HematTech</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MODE -->
<div id="mode" class="center">
  <h1>HematTech</h1>
  <button onclick="adminLogin()">🔐 Admin</button>
  <button onclick="userMode()">👤 User</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="header">
    <h2>📢 HematTech Channel</h2>
  </div>

  <!-- POSTS -->
  <div id="posts"></div>

  <!-- INPUT -->
  <div id="inputBox">
    <input type="file" id="file">
    <input type="text" id="text" placeholder="Write message...">
    <button onclick="send()">➤</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
